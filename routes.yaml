## AMPM Building Services — routes (new "AM→PM" site)
## Every page uses the custom-bs-launch template, slug-routed to a
## partials/launch/* page. Upload in Ghost Admin → Settings → Labs → Routes.

routes:
  /:
    template: custom-bs-launch
    data: page.bs-home
  /services/:
    template: custom-bs-launch
    data: page.bs-services
  /work/:
    template: custom-bs-launch
    data: page.bs-work
  /compliance/:
    template: custom-bs-launch
    data: page.bs-compliance
  /about/:
    template: custom-bs-launch
    data: page.bs-about
  /contact/:
    template: custom-bs-launch
    data: page.bs-contact
  /meph/:
    template: custom-bs-launch
    data: page.bs-meph
  /commercial/:
    template: custom-bs-launch
    data: page.bs-commercial
  /fabric/:
    template: custom-bs-launch
    data: page.bs-fabric
  /groundworks/:
    template: custom-bs-launch
    data: page.bs-groundworks

taxonomies:
  tag: /topic/{slug}/
  author: /author/{slug}/
